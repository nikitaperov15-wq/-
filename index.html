<!DOCTYPE html>
<html lang="ru">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог дверей из массива</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f2ece2;color:#2e2416}

header{background:linear-gradient(135deg,#4a2e0e,#8b6235);padding:18px 20px 12px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.25)}
header h1{color:#f5e8d0;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
header .sub{color:#e8c98a;font-size:12px;letter-spacing:3px;margin-top:4px}

.contacts{background:#2a1a06;color:#f5e8d0;padding:10px 20px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:14px 28px;font-size:14px;border-bottom:2px solid #7a5530}
.contacts a{color:#e8c98a;text-decoration:none;font-weight:500}
.contacts a:hover{color:#f5e8d0}
.contacts .addr{color:#b89060;font-size:13px}

.mat-tabs{display:flex;background:#2a1a06}
.mat-tab{flex:1;background:none;border:none;color:#a07840;padding:13px 8px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.mat-tab:hover{color:#f5e8d0;background:rgba(255,255,255,.05)}
.mat-tab.on{color:#f5e8d0;border-bottom-color:#e8c98a}

.type-bar{background:#faf5ee;border-bottom:1px solid #ddd0bc;padding:7px 14px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.type-bar label{font-size:11px;color:#9a7a55;font-weight:600;margin-right:4px}
.tbtn{background:#fff;border:1px solid #c8b090;color:#6b4c2a;padding:3px 11px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .18s}
.tbtn:hover,.tbtn.on{background:#7a5530;color:#fff;border-color:#7a5530}

.count{text-align:center;padding:9px 14px 3px;font-size:12px;color:#8a6a45}
.count strong{font-size:17px;color:#3a2510;font-weight:700}
.pagination{display:flex;justify-content:center;gap:6px;padding:10px 14px 20px;flex-wrap:wrap}
.page-btn{background:#fff;border:1px solid #c8b090;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .18s}
.page-btn:hover{background:#f0e8d8}
.page-btn.active{background:#7a5530;color:#fff;border-color:#7a5530}
.page-btn.disabled{opacity:.4;pointer-events:none}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding:10px 14px 0;max-width:1440px;margin:0 auto}

.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(80,50,15,.10);transition:transform .2s,box-shadow .2s;cursor:pointer;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(80,50,15,.18)}

.photo{position:relative;width:100%;padding-top:150%;background:#ece7df;border-radius:10px 10px 0 0;overflow:hidden}
.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center bottom;transition:transform .28s}
.card:hover .photo img{transform:scale(1.04)}

.badge{position:absolute;top:6px;right:6px;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;z-index:2;pointer-events:none}
.bs{background:rgba(55,32,8,.82);color:#fff}
.bg{background:rgba(30,80,125,.86);color:#fff}
.bp{background:rgba(45,90,40,.86);color:#fff}

.cbody{padding:8px 9px 10px;display:flex;flex-direction:column;flex:1}
.clabel{font-size:9px;font-weight:700;color:#b09060;text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}
.cname{font-size:12px;font-weight:700;color:#2e1a08;margin-bottom:4px;line-height:1.2}

.swatches{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.sw{width:17px;height:17px;border-radius:50%;border:2px solid #d8c8b0;cursor:pointer;transition:transform .14s,border-color .14s,box-shadow .14s;flex-shrink:0}
.sw:hover{transform:scale(1.2);border-color:#7a5530}
.sw.on{border-color:#7a5530;box-shadow:0 0 0 2px #fff,0 0 0 3px #7a5530;transform:scale(1.1)}
.swlbl{font-size:9px;color:#9a7a55;margin-bottom:4px;min-height:11px}

.cfoot{display:flex;align-items:center;justify-content:flex-end;padding-top:6px;border-top:1px solid #f0e8d8;margin-top:auto}
.bdet{background:#7a5530;color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;white-space:nowrap;transition:background .18s}
.bdet:hover{background:#4a2e0e}

.nores{grid-column:1/-1;text-align:center;padding:60px 20px;color:#a07848;font-size:16px}

.ov{display:none;position:fixed;inset:0;background:rgba(10,5,0,.78);z-index:1000;align-items:center;justify-content:center;padding:12px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;max-width:780px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mhead{background:linear-gradient(90deg,#4a2e0e,#8b6235);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0;flex-shrink:0}
.mhead h2{color:#f5e8d0;font-size:14px;font-weight:600}
.mx{background:none;border:none;color:rgba(245,232,208,.7);font-size:24px;cursor:pointer;line-height:1}
.mx:hover{color:#f5e8d0}
.mbody{display:grid;grid-template-columns:1fr 1.1fr;gap:18px;padding:16px}
@media(max-width:520px){.mbody{grid-template-columns:1fr}}
.mphoto{position:relative;width:100%;padding-top:150%;background:#ece7df;border-radius:10px;overflow:hidden}
.mphoto img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center bottom}
.minfo h3{font-size:16px;color:#2e1a08;margin-bottom:3px}
.mtag{display:inline-block;background:#f0e8d8;color:#7a5530;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:9px}
.mclbl{font-size:11px;color:#7a5530;font-weight:600;min-height:14px;margin-bottom:7px}
.msw-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:3px}
.msw{width:22px;height:22px;border-radius:50%;border:2px solid #d8c8b0;cursor:pointer;transition:transform .14s,border-color .14s,box-shadow .14s}
.msw:hover{transform:scale(1.15);border-color:#7a5530}
.msw.on{border-color:#7a5530;box-shadow:0 0 0 2px #fff,0 0 0 3px #7a5530}
.specs{width:100%;border-collapse:collapse;font-size:11px;margin-top:9px}
.specs td{padding:5px 0;border-bottom:1px solid #f5ede0}
.specs td:first-child{color:#a07848;width:42%;font-weight:500}
.specs td:last-child{color:#2e1a08;font-weight:600}
</style>

</div>

// ===== ЛОГИКА =====
const CLR={
  'белый':'#f4f4f4','белый2':'#eef0f2','кремовый':'#e8d080','кремовый2':'#d8bc50',
  'натуральный':'#c8a055','коричневый':'#7a4818','темный':'#2a1606','темный2':'#1e1006','темный3':'#160a04',
  'бордовый':'#6e1515','серый':'#909090','серый2':'#686868','голубой':'#6a9ab8',
  'слоновая кость':'#f0e8d0','зеленый':'#5a8055','браширование':'#9a7840'
};

let mat='olkha', fGlass='all';
let currentPage=1, perPage=24;
const acl={};
let mModel='';

function data(){return mat==='olkha'?olkha:sosna;}

function group(){
  const g={};
  data().forEach(v=>{if(!g[v.m])g[v.m]=[];g[v.m].push(v);});
  return g;
}

function filteredModels(){
  const G=group();
  const models=Object.keys(G).filter(m=>{
    if(fGlass!=='all' && !G[m].some(v=>v.g===fGlass)) return false;
    return true;
  });
  return models;
}

function render(){
  const models=filteredModels();
  const total=models.length;
  document.getElementById('cNum').textContent=total;
  document.getElementById('cLbl').textContent=total===1?'модель':total<5?'модели':'моделей';

  const totalPages=Math.ceil(total/perPage)||1;
  if(currentPage>totalPages) currentPage=totalPages;
  const start=(currentPage-1)*perPage;
  const end=Math.min(start+perPage,total);
  const pageModels=models.slice(start,end);

  const grid=document.getElementById('grid');
  if(!pageModels.length){grid.innerHTML='<div class="nores">Ничего не найдено</div>';}
  else {
    const G=group();
    const matL=mat==='olkha'?'Массив ольхи':'Массив сосны';
    grid.innerHTML=pageModels.map(m=>{
      const all=G[m];
      const vs=fGlass==='all'?all:all.filter(v=>v.g===fGlass);
      const uniq=[...new Map(vs.map(v=>[v.c,v])).values()];
      const key=mat+'_'+m+'_'+fGlass;
      if(!acl[key]) acl[key]=uniq[0].c;
      const ac=acl[key];
      const cur=vs.find(v=>v.c===ac)||vs[0];
      const bc=cur.g==='глухая'?'bs':cur.g==='остекленная'?'bg':'bp';
      const bt=cur.g==='глухая'?'Глухая':cur.g==='остекленная'?'Остекл.':'Частично';
      const sid='c_'+m.replace(/[^a-zA-Zа-яёА-ЯЁ0-9]/g,'_');
      const sw=uniq.map(v=>`<span class="sw${v.c===ac?' on':''}" style="background:${CLR[v.c]||'#bbb'};${v.c.includes('бел')||v.c==='слоновая кость'?'border-color:#ccc':''}" title="${v.c}" data-m="${m}" data-c="${v.c}"></span>`).join('');
      return `<div class="card" data-m="${m}" data-cur="${ac}">
        <div class="photo"><img id="${sid}_img" src="${cur.i}" alt="${m}" loading="lazy"><span class="badge ${bc}" id="${sid}_badge">${bt}</span></div>
        <div class="cbody">
          <div class="clabel">${matL}</div>
          <div class="cname">${m}</div>
          <div class="swatches">${sw}</div>
          <div class="swlbl" id="${sid}_lbl">${ac} · ${cur.coat}</div>
          <div class="cfoot"><button class="bdet" data-m="${m}">Подробнее</button></div>
        </div>
      </div>`;
    }).join('');
  }

  // Пагинация
  const pag=document.getElementById('pagination');
  pag.innerHTML='';
  if(totalPages>1){
    const prev=document.createElement('button');
    prev.className='page-btn'+(currentPage===1?' disabled':'');
    prev.textContent='‹';
    prev.dataset.p='prev';
    pag.appendChild(prev);
    for(let i=1;i<=totalPages;i++){
      const btn=document.createElement('button');
      btn.className='page-btn'+(i===currentPage?' active':'');
      btn.textContent=i;
      btn.dataset.p=i;
      pag.appendChild(btn);
    }
    const next=document.createElement('button');
    next.className='page-btn'+(currentPage===totalPages?' disabled':'');
    next.textContent='›';
    next.dataset.p='next';
    pag.appendChild(next);
  }
}

// Обработчики
document.addEventListener('click', function(e){
  // Материал
  const matTab=e.target.closest('.mat-tab');
  if(matTab){
    document.querySelectorAll('.mat-tab').forEach(b=>b.classList.remove('on'));
    matTab.classList.add('on');
    mat=matTab.dataset.mat;
    fGlass='all'; currentPage=1;
    document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',i===0));
    render();
    return;
  }
  // Фильтр по типу
  const tbtn=e.target.closest('.tbtn');
  if(tbtn){
    document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
    tbtn.classList.add('on');
    fGlass=tbtn.dataset.g; currentPage=1; render();
    return;
  }
  // Выбор цвета
  const sw=e.target.closest('.sw');
  if(sw){
    const m=sw.dataset.m, c=sw.dataset.c;
    const key=mat+'_'+m+'_'+fGlass;
    acl[key]=c;
    const G=group();
    const vs=fGlass==='all'?G[m]:G[m].filter(v=>v.g===fGlass);
    const v=vs.find(x=>x.c===c)||vs[0];
    const sid='c_'+m.replace(/[^a-zA-Zа-яёА-ЯЁ0-9]/g,'_');
    document.getElementById(sid+'_img').src=v.i;
    document.getElementById(sid+'_lbl').textContent=c+' · '+v.coat;
    const b=document.getElementById(sid+'_badge');
    b.className='badge '+(v.g==='глухая'?'bs':v.g==='остекленная'?'bg':'bp');
    b.textContent=v.g==='глухая'?'Глухая':v.g==='остекленная'?'Остекл.':'Частично';
    const card=e.target.closest('.card');
    card.dataset.cur=c;
    card.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.dataset.c===c));
    return;
  }
  // Кнопка "Подробнее"
  const det=e.target.closest('.bdet');
  if(det){
    const card=det.closest('.card');
    if(card) openModal(card.dataset.m, card.dataset.cur);
    return;
  }
  // Клик по карточке
  const card=e.target.closest('.card');
  if(card && !e.target.closest('.bdet') && !e.target.closest('.sw')){
    openModal(card.dataset.m, card.dataset.cur);
    return;
  }
  // Пагинация
  const pageBtn=e.target.closest('.page-btn');
  if(pageBtn && !pageBtn.classList.contains('disabled')){
    const p=pageBtn.dataset.p;
    if(p==='prev') currentPage--;
    else if(p==='next') currentPage++;
    else currentPage=parseInt(p,10);
    render();
    window.scrollTo({top: document.getElementById('cNum').offsetTop-20, behavior:'smooth'});
    return;
  }
});

// Модальное окно
function openModal(m,curC){
  mModel=m;
  const G=group();
  renderModal(m,G[m],curC||G[m][0].c);
  document.getElementById('ov').classList.add('open');
}
function renderModal(m,all,curC){
  const v=all.find(x=>x.c===curC)||all[0];
  const uniq=[...new Map(all.map(x=>[x.c,x])).values()];
  const matL=mat==='olkha'?'Массив ольхи':'Массив сосны';
  document.getElementById('mH').textContent=matL+' · '+m;
  document.getElementById('mTag').textContent=m;
  document.getElementById('mName').textContent=m+' · '+v.g;
  document.getElementById('mImg').src=v.i;
  document.getElementById('mCLbl').textContent=v.c+' · '+v.coat;
  document.getElementById('mSwatches').innerHTML=uniq.map(x=>
    `<span class="msw${x.c===curC?' on':''}" style="background:${CLR[x.c]||'#bbb'};${x.c.includes('бел')||x.c==='слоновая кость'?'border-color:#ccc':''}" title="${x.c}" data-mc="${x.c}"></span>`
  ).join('');
  document.getElementById('mSpecs').innerHTML=[
    ['Материал',matL],['Модель',m],['Тип',v.g],['Покрытие',v.coat],['Цвет',v.c],
    ['Ширина','600 / 700 / 800 / 900 мм'],['Высота','2000 мм'],['Толщина','40 мм']
  ].map(([k,val])=>`<tr><td>${k}</td><td>${val}</td></tr>`).join('');
}
document.getElementById('mSwatches').addEventListener('click',e=>{
  const sw=e.target.closest('.msw'); if(!sw) return;
  const G=group(); renderModal(mModel,G[mModel],sw.dataset.mc);
});
document.getElementById('mX').onclick=()=>document.getElementById('ov').classList.remove('open');
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')document.getElementById('ov').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('ov').classList.remove('open');});

render();
</script>
</body>
